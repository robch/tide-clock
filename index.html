<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Tide Clock</title>
<link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div id="modeLabel" class="mode-label"></div>
  
  <button id="settingsBtn" class="settings-btn">...</button>
  <button id="bobModeBtn" class="settings-btn bob-btn" title="Bob mode">bob</button>
  
  <div id="tidePredictionsHigh" class="tide-predictions"></div>
  <button id="jumpToHighBtn" class="jump-btn">▶▶</button>
  
  <div id="transportControls" class="permanent-transport">
    <button id="rewindBtn" class="transport-control-btn">◀</button>
    <button id="pauseResetBtn" class="transport-control-btn">↻</button>
    <button id="fastForwardBtn" class="transport-control-btn">▶</button>
  </div>
  
  <div id="dateTimeDisplay" class="datetime-display"></div>
  
  <div id="tidePredictionsLow" class="tide-predictions-low"></div>
  <button id="jumpToLowBtn" class="jump-btn">▶▶</button>

  <div class="app" id="app">
    <div class="clock-wrap">
      <div class="canvas-stack">
        <canvas id="clockFace" width="600" height="600"></canvas>
        <canvas id="clockHands" width="600" height="600"></canvas>
      </div>
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-panel-inner">
        <label>
          Station ID
          <input id="stationId" type="text" value="9437954" />
        </label>
        <button id="useLocationBtn" class="secondary-btn">📍 Use My Location</button>
        <label style="flex-direction: row; align-items: center; gap: 8px;">
          <input id="invertTide" type="checkbox" style="width: auto;" />
          Flip tide direction (fill from center outward)
        </label>
        <label style="flex-direction: row; align-items: center; gap: 8px;">
          <input id="showHourHand" type="checkbox" style="width: auto;" />
          Show hour hand
        </label>
        <label style="flex-direction: row; align-items: center; gap: 8px;">
          <input id="showMinuteHand" type="checkbox" style="width: auto;" />
          Show minute hand
        </label>
        <label style="flex-direction: row; align-items: center; gap: 8px;">
          <input id="showSecondHand" type="checkbox" style="width: auto;" />
          Show second hand
        </label>
        <label style="flex-direction: row; align-items: center; gap: 8px;">
          <input id="showDateTime" type="checkbox" style="width: auto;" checked />
          Show date/time
        </label>
        <label style="flex-direction: row; align-items: center; gap: 8px;">
          <input id="showTidePredictions" type="checkbox" style="width: auto;" checked />
          Show next high/low tides
        </label>
        <label>
          Background Animation
          <select id="particleMode">
            <option value="none">None</option>
            <option value="bubbles">Bubbles</option>
            <option value="plankton">Plankton</option>
            <option value="pulse">Pulse</option>
            <option value="bokeh">Bokeh</option>
          </select>
        </label>
        <label>
          Station Name
          <span id="stationName" class="station-name">North Fork, Nehalem River, OR</span>
        </label>
        <button id="loadBtn">Load Tides</button>
        <span id="status" class="status"></span>
        <button id="closeSettingsBtn" class="icon-btn close-btn" title="Close">&times;</button>
      </div>
    </div>
  </div>

  <script src="tideClock.js?v=7"></script>
  <script src="particles.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
